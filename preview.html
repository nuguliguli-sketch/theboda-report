<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보고서 미리보기 - 더보다 AI</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/print.css">
  <style>
    /* -- 미리보기 전용 스타일 -- */
    .preview-wrap {
      background: #111827;
      min-height: 100vh;
      padding: 32px 0;
    }

    .report-viewer {
      max-width: 220mm;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 각 페이지 카드 (A4 기본) */
    .report-page {
      background: #fff;
      color: #0a1628;
      width: 210mm;
      min-height: 297mm;
      border-radius: 4px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      padding: 20mm 18mm 28mm;
      position: relative;
      box-sizing: border-box;
    }

    /* 페이지 번호 표시 */
    .page-label {
      position: absolute;
      top: -26px;
      left: 0;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
    }

    /* -- 보고서 내부 스타일 (라이트) -- */
    .rpt-body {
      font-family: 'Pretendard Variable', 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
      font-size: 10.5pt;
      color: #0a1628;
      line-height: 1.6;
    }

    /* 커버 (풀 배경 모던 레이아웃) */
    .cover-page {
      background: #1a3669 !important;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      padding: 0 !important;
      overflow: hidden;
      position: relative;
    }
    .cover-top {
      padding: 48px 48px 0;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }
    .cover-doc-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.15em;
      font-weight: 500;
    }
    .cover-hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 48px;
    }
    .cover-glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 44px 48px;
      width: 100%;
      max-width: 520px;
    }
    .cover-accent-line {
      width: 48px;
      height: 3px;
      background: #4a90d9;
      border-radius: 2px;
      margin-bottom: 20px;
    }
    .cover-title {
      font-size: 34px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .cover-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      font-weight: 400;
      margin-bottom: 24px;
    }
    .cover-address {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .cover-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .cover-info-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .cover-info-label {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .cover-info-value {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
    }
    .cover-bottom {
      padding: 0 48px 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .cover-bottom-left {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
    }
    .cover-bottom-logo {
      height: 64px;
    }

    /* 간지 (섹션 구분 페이지) */
    .divider-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #fff !important;
    }
    .divider-line { width: 40px; height: 3px; background: #4a90d9; margin-bottom: 24px; border-radius: 2px; }
    .divider-num { font-size: 13px; font-weight: 700; color: #4a90d9; letter-spacing: 0.1em; margin-bottom: 8px; }
    .divider-title { font-size: 22px; font-weight: 700; color: #1a3669; margin-bottom: 6px; }
    .divider-sub { font-size: 11px; color: #4a6a8a; }

    /* 판정 기준 테이블 */
    .criteria-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 16px; }
    .criteria-table th { background: #f4f7fb; padding: 6px 10px; text-align: left; font-weight: 600; color: #0a1628; border-bottom: 2px solid #d8e2ec; }
    .criteria-table td { padding: 5px 10px; border-bottom: 1px solid #eef2f7; vertical-align: top; }
    .criteria-badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 9px; font-weight: 700; }

    /* 각 페이지 헤더 */
    .rpt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2.5px solid #4a90d9;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .rpt-header-brand {
      font-size: 11px;
      font-weight: 700;
      color: #4a90d9;
    }

    .rpt-header-info {
      font-size: 10px;
      color: #4a6a8a;
    }

    .rpt-page-title {
      font-size: 17px;
      font-weight: 700;
      color: #0a1628;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .rpt-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 10px;
      margin-top: 18px;
      padding-left: 10px;
      border-left: 3px solid #4a90d9;
    }

    /* 정보 테이블 */
    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    .info-table th {
      background: #4a90d9;
      color: #fff;
      font-weight: 600;
      padding: 7px 10px;
      text-align: left;
      font-size: 9.5px;
    }

    .info-table td {
      padding: 7px 10px;
      border: 1px solid #d8e2ec;
      font-size: 10px;
    }

    .info-table tr:nth-child(even) td { background: #f4f7fb; }
    .info-table .label-cell { background: #f4f7fb; font-weight: 600; color: #4a6a8a; width: 120px; }

    /* 상태 뱃지 */
    .pb { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .pb.good   { background: #f0fff4; color: #27ae60; }
    .pb.normal { background: #fff8e1; color: #e67e22; }
    .pb.bad    { background: #fff8e1; color: #d35400; }
    .pb.danger { background: #fff0f0; color: #c0392b; }
    .pb.na     { background: #f4f7fb; color: #4a6a8a; }
    .pb.none   { background: #f4f7fb; color: #4a6a8a; }

    /* 지표 그리드 */
    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .indicator-card {
      border: 1px solid #d8e2ec;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }

    .indicator-label { font-size: 9px; color: #4a6a8a; margin-bottom: 4px; }
    .indicator-value { font-size: 11px; font-weight: 700; }

    /* 내구연한 테이블 */
    .dur-table-print {
      width: 100%;
      border-collapse: collapse;
      font-size: 9.5px;
    }

    .dur-table-print th {
      background: #4a90d9;
      color: #fff;
      padding: 6px 8px;
      text-align: center;
      font-size: 9px;
    }

    .dur-table-print td {
      padding: 6px 8px;
      border: 1px solid #d8e2ec;
      text-align: center;
    }

    .dur-table-print tr:nth-child(even) td { background: #f4f7fb; }
    .dur-table-print .item-name { text-align: left; font-weight: 600; }

    /* 체크리스트 테이블 */
    .checklist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9.5px;
      margin-bottom: 12px;
    }
    .checklist-table th {
      background: #f4f7fb;
      color: #4a6a8a;
      padding: 5px 8px;
      text-align: left;
      font-size: 9px;
      border-bottom: 1px solid #d8e2ec;
    }
    .checklist-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 9.5px;
    }
    .checklist-table .sub-name { font-weight: 600; color: #0a1628; }

    /* 측정 테이블 (미리보기용) */
    .meas-table-print {
      width: 100%;
      border-collapse: collapse;
      font-size: 9.5px;
      margin-bottom: 12px;
    }
    .meas-table-print th {
      background: #4a90d9;
      color: #fff;
      padding: 5px 8px;
      text-align: left;
      font-size: 9px;
    }
    .meas-table-print td {
      padding: 5px 8px;
      border: 1px solid #d8e2ec;
      font-size: 9.5px;
    }
    .meas-table-print tr:nth-child(even) td { background: #f4f7fb; }
    .meas-table-title {
      font-size: 10px;
      font-weight: 700;
      color: #4a90d9;
      margin: 12px 0 6px;
      padding-left: 8px;
      border-left: 2px solid #4a90d9;
    }

    /* 세부진단 카드 */
    .diag-card {
      border: 1px solid #d8e2ec;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .diag-card-header {
      background: #f4f7fb;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d8e2ec;
    }

    .diag-card-title { font-size: 10.5px; font-weight: 700; color: #0a1628; }

    .diag-card-body { padding: 10px 12px; }

    .diag-label { font-size: 9px; color: #4a6a8a; font-weight: 600; margin-bottom: 2px; }
    .diag-text { font-size: 10px; color: #4a6a8a; margin-bottom: 8px; white-space: pre-wrap; line-height: 1.6; }

    /* 사진 */
    .photo-grid {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .photo-grid[data-cols="1"] { grid-template-columns: 1fr; }
    .photo-grid[data-cols="2"] { grid-template-columns: 1fr 1fr; }
    .photo-grid[data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
    .photo-grid[data-cols="4"] { grid-template-columns: 1fr 1fr; }
    .photo-grid[data-cols="6"] { grid-template-columns: 1fr 1fr 1fr; }
    .photo-grid[data-cols="8"] { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .photo-cell img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #d8e2ec;
      display: block;
    }

    .photo-cell-caption {
      font-size: 8px;
      color: #4a6a8a;
      text-align: center;
      margin-top: 2px;
      background: #f4f7fb;
      padding: 2px 4px;
      border-radius: 2px;
    }

    /* 세부 판정 */
    .sj-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
      margin-bottom: 8px;
    }
    .sj-table th {
      background: #f4f7fb;
      padding: 4px 8px;
      text-align: left;
      color: #4a6a8a;
      font-size: 8.5px;
    }
    .sj-table td {
      padding: 4px 8px;
      border-bottom: 1px solid #f0f2f5;
    }

    /* 전문가 의견 */
    .expert-box {
      border: 1px solid #d8e2ec;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .expert-box-title {
      font-size: 10.5px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 6px;
    }

    .expert-box-text {
      font-size: 10px;
      color: #4a6a8a;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    /* 종합판단 요약 */
    .summary-overall {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid #d8e2ec;
      border-radius: 6px;
      margin-bottom: 14px;
      background: #f4f7fb;
    }

    .overall-label { font-size: 11px; font-weight: 700; color: #0a1628; }

    .priority-list {
      border: 1px solid #d8e2ec;
      border-radius: 6px;
      overflow: hidden;
    }

    .priority-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 7px 12px;
      font-size: 10px;
      border-bottom: 1px solid #f4f7fb;
    }

    .priority-item:last-child { border-bottom: none; }
    .priority-num { font-weight: 700; color: #4a90d9; min-width: 20px; }

    /* 페이지 풋터 (하단 고정) */
    .rpt-footer {
      position: absolute;
      bottom: 18mm;
      left: 18mm;
      right: 18mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #d8e2ec;
      padding-top: 6px;
      font-size: 9px;
      color: #4a6a8a;
    }

    /* 없음 표시 */
    .empty-text {
      font-size: 10px;
      color: #aab8c2;
      font-style: italic;
    }

    /* -- 상단 컨트롤 바 (웹전용) -- */
    .preview-controls {
      background: rgba(10,22,40,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .preview-controls-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .preview-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .preview-back:hover { color: var(--text-primary); }

    .preview-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .print-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* 평면도 인쇄 크기 축소 — p.2 의뢰인/보고서번호까지 A4 한 페이지에 들어오도록 */
    @media print {
      #preview-floorplan { max-height: 88mm !important; }
      #preview-floorplan img { max-height: 88mm !important; }

      /* ──────────────────────────────────────────────
       * 표지 PDF 출력 수리 (Chrome/Edge 인쇄 엔진 대응)
       *
       * 문제:
       *  1. backdrop-filter: blur()는 print 미지원 → cover-glass 박스가 사실상 사라짐
       *  2. Chrome이 흰 텍스트에 color-adjust: economy 적용 시 텍스트가 날아감
       *  3. rgba 반투명 배경이 기기에 따라 완전히 투명으로 렌더될 수 있음
       *
       * 해결:
       *  - print-color-adjust: exact 강제 (잉크 절약 방지)
       *  - backdrop-filter 제거
       *  - 박스 배경을 solid 색으로 대체 (Brand Deep보다 약간 밝은 톤)
       *  - 모든 텍스트 색상 solid 지정
       * ────────────────────────────────────────────── */
      .cover-page,
      .cover-page * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      .cover-page {
        background: #1a3669 !important;
      }
      .cover-page .cover-glass {
        background: #223d72 !important;            /* Brand Deep 위에 올라간 반투명 흰색 대체 solid */
        border: 0.4mm solid #3d5a8e !important;    /* 원본 rgba(255,255,255,0.12) 대체 */
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        box-shadow: 0 2mm 8mm rgba(0,0,0,0.18) !important;
      }
      .cover-page .cover-accent-line {
        background: #4a90d9 !important;
      }
      .cover-page .cover-doc-label {
        color: #c5d4e8 !important;
      }
      .cover-page .cover-title {
        color: #ffffff !important;
      }
      .cover-page .cover-subtitle {
        color: #a5bad4 !important;
      }
      .cover-page .cover-address {
        color: #e4ecf7 !important;
      }
      .cover-page .cover-info-item {
        border-bottom: 0.2mm solid #3d5a8e !important;
      }
      .cover-page .cover-info-label {
        color: #a5bad4 !important;
      }
      .cover-page .cover-info-value {
        color: #ffffff !important;
      }
      .cover-page .cover-bottom-left {
        color: #8fa5c0 !important;
      }
    }
  </style>
</head>
<body>

<!-- -- 상단 컨트롤 (인쇄시 숨겨짐) -- -->
<div class="preview-controls no-print">
  <div class="preview-controls-left">
    <a href="index.html" class="preview-back">
      &larr; 입력으로
    </a>
    <div class="preview-title" id="ctrl-title">보고서 미리보기</div>
  </div>
  <div style="display:flex; align-items:center; gap:10px">
    <span class="print-hint">Ctrl+P 또는 아래 버튼으로 출력</span>
    <button class="btn btn-secondary btn-sm" onclick="window.print()">인쇄 / PDF 저장</button>
    <a href="index.html" class="btn btn-ghost btn-sm">수정하기</a>
  </div>
</div>

<!-- -- 보고서 뷰어 -- -->
<div class="preview-wrap" id="preview-wrap">
  <div class="report-viewer" id="report-viewer">
    <!-- JS로 렌더링 -->
  </div>
</div>

<script src="assets/report.js"></script>
<script src="assets/criteria-data.js"></script>
<script>
// ==========================================
// 헬퍼
// ==========================================
function pb(status) {
  if (!status) return '<span class="pb none">미입력</span>';
  const map = {
    good: '특이사항없음', normal: '경미/관리필요', bad: '보수/교체권장', danger: '즉시조치필요',
    na: '해당없음',
    low: '낮음', medium: '보통', high: '높음', very_high: '매우높음'
  };
  return `<span class="pb ${Report.statusClass(status)}">${map[status] || status}</span>`;
}

function val(v, fallback = '-') {
  return v && String(v).trim() ? v : fallback;
}

// 비용 값 렌더 헬퍼 — 0/0원은 "별도 산정" 뱃지로 치환
function renderCost(v) {
  const s = String(v == null ? '' : v).trim();
  if (!s) return '<span style="color:#aab8c2">-</span>';
  if (s === '0' || s === '0원' || s === '0 원') {
    return '<span style="display:inline-block; padding:2px 10px; background:#f4f7fb; color:#4a6a8a; border:1px solid #d8e2ec; border-radius:9999px; font-size:9px; font-weight:600; white-space:nowrap">별도 산정</span>';
  }
  return escapeHTML(s);
}

// 내구연한 잔여연한 셀 스타일 — status 기반 시각 분리
// 실측 양호(good)/해당없음(na)은 잔여가 0년이어도 회색으로 표시해 "보수/교체" 등과 시각 충돌 방지
function getDurRemainingStyle(row) {
  const rem = parseFloat(row.remaining);
  const st = row.status;
  if (st === 'good' || st === 'na') return 'color:#7a8fa3; font-weight:500';
  if (isNaN(rem)) return 'color:#aab8c2';
  if (rem > 5)    return 'color:#27ae60; font-weight:700';
  if (rem >= 1)   return 'color:#e67e22; font-weight:700';
  return 'color:#c0392b; font-weight:700';
}

// 내구연한 비고 자동 생성 — 사용자 입력 비고가 있으면 그것을 우선 사용
function getDurNote(row) {
  if (row.comment && String(row.comment).trim()) return String(row.comment);
  const rem = parseFloat(row.remaining);
  if (isNaN(rem) || rem > 5) return '';
  if (row.status === 'good')   return '실측 성능 양호 — 예방적 교체 선택';
  if (row.status === 'na')     return '해당 설비 없음 / 점검 제외';
  if (row.status === 'normal') return '내구연한 임박 — 정기 점검 강화';
  if (row.status === 'bad')    return '내구연한 초과 — 보수/교체 권장';
  if (row.status === 'danger') return '내구연한 초과 — 즉시 교체 검토';
  return '';
}

function pageWrap(num, content) {
  return `

function pageHeader(report, pageTitle) {

function escapeHTML(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==========================================
// 고정 테이블 렌더링 (미리보기용)
// ==========================================
function renderFixedTablePreview(tableKey, tableDef, rows) {
  if (!rows || rows.length === 0) return '';
  // 모든 값이 비어있으면 렌더링 안함
  const hasData = rows.some(row => Object.values(row).some(v => v && String(v).trim()));
  if (!hasData) return '';

  let theadHTML = tableDef.columns.map(col => `<th>${col}</th>`).join('');
  let tbodyHTML = rows.map(row => {
    const vals = Object.values(row);
    return `<tr>${vals.map(v => `<td>${val(v, '')}</td>`).join('')}</tr>`;
  }).join('');

  return `
    <div class="meas-table-title">${tableDef.title}</div>
    <table class="meas-table-print">
      <thead><tr>${theadHTML}</tr></thead>
      <tbody>${tbodyHTML}</tbody>
    </table>
  `;
}

  // 관리 권장 항목 (보수/교체·즉시조치로 판정된 항목 목록)
  // subStatuses + 카드 subJudgments 모두 포함. 카드 subJudgments는 위치(카드 title) 병기로
  // 동일 이름의 항목(예: "목재 문틀 부식" x 공용/부부)이 구분되도록 함.
  const issueItemsP = [];
  Object.entries(report.categoryData || {}).forEach(([cat, cd]) => {
    const catLabel = (Report.CATEGORIES[cat] || {}).label || cat;

    // subStatuses 순회
    Object.entries(cd.subStatuses || {}).forEach(([name, st]) => {
      if (st === 'bad' || st === 'danger') {
        issueItemsP.push({ cat: catLabel, name, status: st });
      }
    });

    // 카드 subJudgments도 순회 (같은 이름이 여러 카드에 있을 경우 카드 제목 병기)
    const allCards = [];
    if (cd.cards) allCards.push(...cd.cards);
    if (cd.cardSlots) {
      Object.values(cd.cardSlots).forEach(slotCards => allCards.push(...(slotCards || [])));
    }
    // 같은 sj.name이 여러 카드에 등장하는지 사전 집계
    const nameCount = {};
    allCards.forEach(card => {
      (card.subJudgments || []).forEach(sj => {
        if (sj.status === 'bad' || sj.status === 'danger') {
          nameCount[sj.name] = (nameCount[sj.name] || 0) + 1;
        }
      });
    });
    allCards.forEach(card => {
      (card.subJudgments || []).forEach(sj => {
        if (sj.status === 'bad' || sj.status === 'danger') {
          // 중복 이름은 카드 제목 병기로 구분
          const displayName = (nameCount[sj.name] > 1 && card.title)
            ? `${sj.name} (${card.title})`
            : sj.name;
          issueItemsP.push({ cat: catLabel, name: displayName, status: sj.status });
        }
      });
    });
  });

  // 종합판단요약 토글 — false면 종합 판정/요약 섹션 생략 (통계는 유지)
  const summaryEnabled = sum.enabled !== false;

  pages.push(pageWrap(pageNum, `
    ${pageHeader(report, '종합 진단 결과 요약')}
    ${summaryEnabled ? `
      <div class="summary-overall">
        <span class="overall-label">종합 판정</span>
        ${pb(sum.overallStatus)}
        <span style="font-size:10px;color:#4a6a8a;margin-left:12px">예상보수비용: 약 ${val(ind.repairCostMin, '?')}~${val(ind.repairCostMax, '?')}만원</span>
      </div>

      ${sum.summaryText ? `
        <div class="rpt-section-title">종합 요약</div>
        <div style="font-size:10px; color:#4a6a8a; line-height:1.7; margin-bottom:12px; white-space:pre-wrap">${val(sum.summaryText)}</div>
      ` : ''}
    ` : ''}

    <div class="rpt-section-title">진단 통계</div>
    <div style="font-size:9px; color:#4a6a8a; line-height:1.55; margin-bottom:8px">
      Executive Summary(한눈에 보는 진단 요약)에서 제시한 총괄 수치를 재확인합니다. 카테고리별 분해 현황과 관리 권장 세부 항목은 아래 표에서 이어서 확인하실 수 있습니다.
    </div>
    <div style="display:flex; gap:10px; margin-bottom:6px">
      ${Object.entries(statusLabelsP).map(([k, label]) => `
        <div style="flex:1; text-align:center; padding:8px 4px; background:${statusColorsP[k]}10; border-radius:6px; border:1px solid ${statusColorsP[k]}30">
          <div style="font-size:18px; font-weight:700; color:${statusColorsP[k]}">${totalStats[k] || 0}</div>
          <div style="font-size:8px; color:#4a6a8a">${label}</div>
        </div>
      `).join('')}
    </div>
    <div style="font-size:8.5px; color:#7a8fa3; text-align:right; margin-bottom:14px">
      전체 ${totalStats.total || 0}개 점검 항목 기준${naBreakdownText} · 상세 내역은 아래 카테고리별 현황 참조
    </div>

    <div class="rpt-section-title">카테고리별 현황</div>
    <table class="info-table" style="font-size:9px; margin-bottom:14px">
      <thead><tr>
        <th style="padding:3px 6px; text-align:left">카테고리</th>
        ${Object.entries(statusLabelsP).map(([k,v]) => `<th style="padding:3px 4px; text-align:center; color:${statusColorsP[k]}">${v}</th>`).join('')}
        <th style="padding:3px 4px; text-align:center; color:#7a8fa3">해당없음</th>
      </tr></thead>
      <tbody>
        ${Object.entries(catStats).map(([cat, s]) => `
          <tr${s.bad > 0 || s.danger > 0 ? ' style="background:#fff0f0"' : ''}>
            <td style="padding:3px 6px; font-weight:600">${s.label}</td>
            ${['good','normal','bad','danger'].map(k =>
              `<td style="padding:3px 4px; text-align:center; ${s[k] > 0 ? 'font-weight:700; color:'+statusColorsP[k] : 'color:#aab8c2'}">${s[k] || '-'}</td>`
            ).join('')}
            <td style="padding:3px 4px; text-align:center; ${s.na > 0 ? 'font-weight:700; color:#7a8fa3' : 'color:#aab8c2'}">${s.na || '-'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    ${issueItemsP.length > 0 ? `
      <div class="rpt-section-title">관리 권장 항목</div>
      <table class="info-table" style="font-size:9px; margin-bottom:14px">
        <thead><tr><th style="padding:3px 6px">판정</th><th style="padding:3px 6px">카테고리</th><th style="padding:3px 6px">항목</th></tr></thead>
        <tbody>
          ${issueItemsP.map(item => `
            <tr style="background:${item.status === 'danger' ? '#fff0f0' : '#fff8e1'}">
              <td style="padding:3px 6px"><span class="status-badge ${item.status}">${item.status === 'danger' ? '즉시조치' : '보수/교체'}</span></td>
              <td style="padding:3px 6px; font-size:8px; color:#4a6a8a">${escapeHTML(item.cat)}</td>
              <td style="padding:3px 6px; font-weight:600">${escapeHTML(item.name)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : ''}

    ${durWarningsP.length > 0 ? `
      <div class="rpt-section-title">내구연한 주의 (잔여 5년 이하)</div>
      <table class="info-table" style="font-size:9px">
        <thead><tr><th style="padding:3px 6px">항목</th><th style="padding:3px 6px">잔여</th><th style="padding:3px 6px">상태</th></tr></thead>
        <tbody>
          ${durWarningsP.map(w => `
            <tr style="background:${parseFloat(w.remaining) <= 0 ? '#fff0f0' : '#fff8e1'}">
              <td style="padding:3px 6px; font-weight:600">${w.item}</td>
              <td style="padding:3px 6px; font-weight:700; color:${parseFloat(w.remaining) <= 0 ? '#c0392b' : '#e67e22'}">${w.remaining}년</td>
              <td style="padding:3px 6px">${pb(w.status)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : ''}

    ${pageFooter(report, pageNum)}
  `));
  pageNum++;

  // ── Page 6: 전문가 분석의견 ──
  // 전문가 분석의견 토글 — false면 페이지 자체를 생략
  const exp = report.expertOpinion || {};
  if (exp.enabled !== false) {
    pages.push(pageWrap(pageNum, `
      ${pageHeader(report, '전문가 분석 및 의견')}
      <div class="expert-box">
        <div class="expert-box-title">안전 리스크</div>
        <div class="expert-box-text">${val(exp.safetyRisk)}</div>
      </div>
      <div class="expert-box">
        <div class="expert-box-title">비용 리스크</div>
        <div class="expert-box-text">${val(exp.costRisk)}</div>
      </div>
      <div class="expert-box">
        <div class="expert-box-title">성능 및 거주체감</div>
        <div class="expert-box-text">${val(exp.livingPerformance)}</div>
      </div>
      ${b.managementIssues ? `
        <div class="expert-box" style="border-left-color:#7a8fa3; background:#f4f7fb">
          <div class="expert-box-title" style="color:#4a6a8a">참고 — 단지 관리 및 정비사업 동향</div>
          <div class="expert-box-text" style="white-space:pre-wrap">${escapeHTML(b.managementIssues)}</div>
        </div>
      ` : ''}
      ${pageFooter(report, pageNum)}
    `));
    pageNum++;
  }

  // ── 간지: 세부진단 ──
  pages.push(`
    <div class="report-page divider-page">
      <span class="page-label no-print">간지</span>
      <div class="divider-line"></div>
      <div class="divider-num">PART 03</div>
      <div class="divider-title">세부 진단 결과</div>
      <div class="divider-sub">Detailed Inspection Results</div>
    </div>
  `);

  // ── 세부 진단 결과표 (A~H 요약) ──
  // catStats는 이미 Page 5에서 선언됨

  pages.push(pageWrap(pageNum, `
    ${pageHeader(report, '세부진단 결과표')}

    <div style="margin-bottom:12px; padding:10px 14px; background:#f4f7fb; border-radius:6px; border-left:3px solid #4a90d9">
      <div style="font-size:9px; font-weight:700; color:#1a3669; letter-spacing:0.03em; margin-bottom:5px">본문 주요 용어 안내</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px 14px; font-size:8.5px; color:#4a6a8a; line-height:1.55">
        <div><strong style="color:#0a1628">PPC 배관</strong> — Polypropylene Copolymer. 1990년대 구축 아파트에 일부 사용된 폴리프로필렌 합성수지 난방배관으로, 장기 사용 시 내열·내구 성능 저하가 보고되는 재질</div>
        <div><strong style="color:#0a1628">도막 방수</strong> — 바탕면에 액상 방수재를 도포하여 이음매 없는 방수막을 형성하는 공법. 욕실·발코니 등 누수 취약부 전면 보수 시 주로 적용</div>
        <div><strong style="color:#0a1628">ELB / MCB</strong> — ELB는 누전차단기(Earth Leakage Breaker, 누전 시 차단), MCB는 배선용 차단기(Miniature Circuit Breaker, 과전류 차단). 분전반의 주요 보호 장치</div>
        <div><strong style="color:#0a1628">열교 (Thermal Bridge)</strong> — 단열재가 끊기거나 얇아진 구조적 취약 지점에서 열이 집중 이동해 내부 표면 온도가 낮아지는 현상. 결로·곰팡이의 주요 원인</div>
      </div>
    </div>

    <table class="info-table">
      <thead>
        <tr>
          <th>카테고리</th>
          <th>특이사항없음</th>
          <th>경미/관리</th>
          <th>보수/교체</th>
          <th>즉시조치</th>
          <th>해당없음</th>
          <th>전체</th>
          <th>종합</th>
        </tr>
      </thead>
      <tbody>
        ${Object.entries(catStats).map(([cat, s]) => {
          let overall = '';
          if (s.danger > 0) overall = 'danger';
          else if (s.bad > 0) overall = 'bad';
          else if (s.normal > 0) overall = 'normal';
          else if (s.good > 0) overall = 'good';
          else if (s.na > 0 && s.na === s.total) overall = 'na';
          return `
            <tr>
              <td style="font-weight:600">${s.label}</td>
              <td style="text-align:center;color:#27ae60;font-weight:600">${s.good}</td>
              <td style="text-align:center;color:#e67e22;font-weight:600">${s.normal}</td>
              <td style="text-align:center;color:#d35400;font-weight:600">${s.bad}</td>
              <td style="text-align:center;color:#c0392b;font-weight:600">${s.danger}</td>
              <td style="text-align:center;color:#7a8fa3;font-weight:600">${s.na}</td>
              <td style="text-align:center;color:#4a6a8a">${s.total}</td>
              <td style="text-align:center">${pb(overall)}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    ${pageFooter(report, pageNum)}
  `));
  pageNum++;

  // ── Pages 8+: 세부 진단 카테고리별 ──
  const catData = report.categoryData || {};

  for (const [cat, catInfo] of Object.entries(CATS)) {
    const cd = catData[cat] || { subStatuses: {}, opinion: '', fixedTables: {}, cards: [] };

    let catContent = '';

    // 체크리스트
    const subs = cd.subStatuses || {};
    const subEntries = Object.entries(subs).filter(([, v]) => v);
    if (subEntries.length > 0) {
      catContent += `
        <div class="rpt-section-title">주요점검항목</div>
        <table class="checklist-table">
          <thead><tr><th>점검항목</th><th>판정</th></tr></thead>
          <tbody>
            ${catInfo.subItems.map(sub => `
              <tr>
                <td class="sub-name">${sub}</td>
                <td>${subs[sub] ? pb(subs[sub]) : '<span class="empty-text">미입력</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // 종합의견 (opinionEnabled가 false면 렌더링 생략)
    if (cd.opinionEnabled !== false && cd.opinion && cd.opinion.trim()) {
      catContent += `
        <div class="rpt-section-title">종합의견</div>
        <div style="font-size:10px; color:#4a6a8a; line-height:1.7; white-space:pre-wrap; margin-bottom:12px">${escapeHTML(cd.opinion)}</div>
      `;
    }

    // 카드 렌더링 헬퍼
    function renderCardPreview(card, catKey) {
      if (!card.title && !card.fieldNote && !card.actionGuide &&
          (!card.photos || card.photos.filter(Boolean).length === 0) &&
          (!card.subJudgments || card.subJudgments.length === 0)) {
        return '';
      }

      let cardBody = '';

      if (card.subJudgments && card.subJudgments.length > 0) {
        const validSJ = card.subJudgments.filter(sj => sj.name || sj.status);
        if (validSJ.length > 0) {
          cardBody += `
            <table class="sj-table">
              <thead><tr><th>항목</th><th>판정</th></tr></thead>
              <tbody>
                ${validSJ.map(sj => `
                  <tr>
                    <td>${val(sj.name)}</td>
                    <td>${pb(sj.status)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }
      }

      if (card.fieldNoteEnabled !== false && card.fieldNote && card.fieldNote.trim()) {
        cardBody += `
          <div class="diag-label">현장노트</div>
          <div class="diag-text">${escapeHTML(card.fieldNote)}</div>
        `;
      }
      if (card.actionGuideEnabled !== false && card.actionGuide && card.actionGuide.trim()) {
        cardBody += `
          <div class="diag-label">조치 가이드</div>
          <div class="diag-text">${escapeHTML(card.actionGuide)}</div>
        `;
      }

      const validPhotos = (card.photos || []).filter(Boolean);
      if (validPhotos.length > 0) {
        const cols = card.photoLayout || String(validPhotos.length);
        cardBody += `
          <div class="photo-grid" data-cols="${cols}" id="cardphotos_${catKey}_${card.id}">
            ${validPhotos.map((p, pi) => `
              <div class="photo-cell" id="pcell_${catKey}_${card.id}_${pi}">
                <div style="background:#f4f7fb;width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aab8c2;border-radius:4px">사진 로딩중...</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      return `
        <div class="diag-card">
          <div class="diag-card-header">
            <span class="diag-card-title">${val(card.title, '(제목 없음)')}</span>
          </div>
          <div class="diag-card-body">
            ${cardBody || '<span class="empty-text">내용 없음</span>'}
          </div>
        </div>
      `;
    }

    // 섹션 기반 또는 기본 렌더링
    if (catInfo.sections) {
      catInfo.sections.forEach(sec => {
        if (sec.type === 'table') {
          // 비활성 테이블은 렌더링 생략
          if ((cd.tableEnabled || {})[sec.key] === false) return;
          const tableDef = catInfo.fixedTables[sec.key];
          if (tableDef) {
            const rows = (cd.fixedTables || {})[sec.key] || [];
            catContent += renderFixedTablePreview(sec.key, tableDef, rows);
          }
        } else if (sec.type === 'cards') {
          const slotCards = (cd.cardSlots || {})[sec.key] || [];
          slotCards.forEach(card => {
            catContent += renderCardPreview(card, cat + '_' + sec.key);
          });
        }
      });
    } else {
      // 기존 방식
      if (catInfo.fixedTables) {
        Object.entries(catInfo.fixedTables).forEach(([tableKey, tableDef]) => {
          // 비활성 테이블은 렌더링 생략
          if ((cd.tableEnabled || {})[tableKey] === false) return;
          const rows = (cd.fixedTables || {})[tableKey] || [];
          catContent += renderFixedTablePreview(tableKey, tableDef, rows);
        });
      }
      (cd.cards || []).forEach(card => {
        catContent += renderCardPreview(card, cat);
      });
    }

    // 내용이 없더라도 카테고리는 렌더링
    if (!catContent.trim()) {
      catContent = '<div class="empty-text" style="padding:20px 0">입력된 내용이 없습니다.</div>';
    }

    // ── 카테고리 종합 상태 배너 (카테고리 페이지 최상단 배치) ──
    // 해당 카테고리 전체의 상태를 요약 + 권장 조치를 한눈에 전달
    // catStats(상단에서 계산됨)를 사용해 카테고리별 판정 집계 참조
    // 페이지 최상단에 배치하여 "개별 카드에 대한 설명"과 혼동되지 않도록 함
    const catStatForBanner = catStats[cat] || { good:0, normal:0, bad:0, danger:0, na:0, total:0 };
    let bannerLevel, bannerLabel, bannerAction, bannerBg, bannerBorder, bannerColor;
    if (catStatForBanner.danger > 0) {
      bannerLevel = '긴급';
      bannerLabel = '즉시조치 필요';
      bannerAction = '전문 업체의 현장 재확인 및 보수 계획 수립을 권장드립니다. 필요 시 담당 진단자에게 추가 상담을 요청하세요.';
      bannerBg = '#fff0f0';
      bannerBorder = '#c0392b';
      bannerColor = '#c0392b';
    } else if (catStatForBanner.bad > 0) {
      bannerLevel = '주의';
      bannerLabel = '보수/교체 권장';
      bannerAction = '방치 시 추가 손상 또는 비용 증가가 우려되는 항목이 있습니다. 빠른 시일 내 전문 업체 견적 및 보수를 권장드립니다.';
      bannerBg = '#fff8e1';
      bannerBorder = '#d35400';
      bannerColor = '#d35400';
    } else if (catStatForBanner.normal > 0) {
      bannerLevel = '관리';
      bannerLabel = '경미 관리 필요';
      bannerAction = '현재 사용에는 문제가 없으나 경미한 관리가 필요한 항목이 확인되었습니다. 다음 정기 점검 시 상태를 재확인하시기 바랍니다.';
      bannerBg = '#fff8e1';
      bannerBorder = '#e67e22';
      bannerColor = '#e67e22';
    } else if (catStatForBanner.good > 0) {
      bannerLevel = '양호';
      bannerLabel = '현재 상태 양호';
      bannerAction = '해당 카테고리의 점검 항목은 모두 양호한 상태로 확인되었습니다. 정기 점검 주기에 맞춰 상태를 유지해주시기 바랍니다.';
      bannerBg = '#f0fff4';
      bannerBorder = '#27ae60';
      bannerColor = '#27ae60';
    } else if (catStatForBanner.na > 0 && catStatForBanner.na === catStatForBanner.total) {
      // 전 항목 해당없음 → 점검 생략 카테고리 (예: H 전면 재시공 전제)
      bannerLevel = '참고';
      bannerLabel = '점검 생략 — 리모델링 시 전면 재시공 전제';
      bannerAction = '본 카테고리는 해당 설비 부재 또는 진단 방침에 따라 세부 점검을 생략했습니다. 자세한 사유는 아래 종합의견을 참고해주세요.';
      bannerBg = '#f4f7fb';
      bannerBorder = '#7a8fa3';
      bannerColor = '#4a6a8a';
    } else {
      // 완전히 비어있음 (판정 전혀 없음)
      bannerLevel = '';
    }

    const countParts = [];
    if (catStatForBanner.good > 0)   countParts.push(`<span style="color:#27ae60; font-weight:700">특이사항없음 ${catStatForBanner.good}</span>`);
    if (catStatForBanner.normal > 0) countParts.push(`<span style="color:#e67e22; font-weight:700">경미/관리 ${catStatForBanner.normal}</span>`);
    if (catStatForBanner.bad > 0)    countParts.push(`<span style="color:#d35400; font-weight:700">보수/교체 ${catStatForBanner.bad}</span>`);
    if (catStatForBanner.danger > 0) countParts.push(`<span style="color:#c0392b; font-weight:700">즉시조치 ${catStatForBanner.danger}</span>`);
    if (catStatForBanner.na > 0)     countParts.push(`<span style="color:#7a8fa3">해당없음 ${catStatForBanner.na}</span>`);

    const bannerHTML = bannerLevel ? `
      <div style="margin-bottom:12px; padding:11px 14px; background:${bannerBg}; border-left:4px solid ${bannerBorder}; border-radius:6px; page-break-inside:avoid">
        <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:4px">
          <span style="font-size:8.5px; font-weight:700; color:${bannerColor}; background:#ffffff; padding:2px 8px; border-radius:9999px; border:1px solid ${bannerBorder}; letter-spacing:0.03em">카테고리 종합 — ${bannerLevel}</span>
          <span style="font-size:11px; font-weight:700; color:#0a1628">${bannerLabel}</span>
        </div>
        <div style="font-size:9px; color:#4a6a8a; line-height:1.6; margin-bottom:5px">${bannerAction}</div>
        ${countParts.length > 0 ? `<div style="font-size:9px; color:#7a8fa3; padding-top:5px; border-top:1px dashed rgba(74,106,138,0.2)">판정 집계 — ${countParts.join(' · ')}</div>` : ''}
      </div>
    ` : '';

    // 점검 생략 사유 박스 — cd.skippedNote가 있을 때만 렌더 (옵션 C)
    // "해당없음 = 설비 부재" vs "미측정 = 일정 제약" 구분을 명시적으로 표시
    const skipNoteText = (cd.skippedNote || '').trim();
    const skipNoteHTML = skipNoteText ? `
      <div style="margin-bottom:12px; padding:10px 14px; background:#f4f7fb; border-left:3px solid #7a8fa3; border-radius:6px; page-break-inside:avoid">
        <div style="font-size:9px; font-weight:700; color:#4a6a8a; margin-bottom:4px; letter-spacing:0.03em">참고 — 점검 생략 항목</div>
        <div style="font-size:9px; color:#4a6a8a; line-height:1.65; white-space:pre-wrap">${escapeHTML(skipNoteText)}</div>
      </div>
    ` : '';

    pages.push(pageWrap(pageNum, `
      ${pageHeader(report, `세부 진단 - ${catInfo.label}`)}
      ${bannerHTML}
      ${skipNoteHTML}
      ${catContent}
      ${pageFooter(report, pageNum)}
    `));
    pageNum++;
  }

  // ── 간지: 점검 기준 안내 ──
  pages.push(`
    <div class="report-page divider-page">
      <span class="page-label no-print">간지</span>
      <div class="divider-line"></div>
      <div class="divider-num">APPENDIX</div>
      <div class="divider-title">카테고리별 점검 항목</div>
      <div class="divider-sub">Inspection Item Reference</div>
    </div>
  `);

  // ── APPENDIX: 카테고리별 점검 항목 요약 (1페이지) ──
  // 판정 등급 · 방법론 · 한계는 p.6 판정 기준 안내에 이미 있음 → 중복 제거
  // 여기서는 오직 "각 카테고리에서 실제 점검한 항목"만 보여줌
  // 항목 리스트: Report.CATEGORIES[key].subItems (authoritative, 세부진단 페이지와 동일)
  // 참고 근거: window.CRITERIA_PAGES[key].items[*].reference (있으면)
  pageNum++;
  const cats = Report.CATEGORIES || {};
  const criteriaPages = window.CRITERIA_PAGES || {};
  const catCardsHTML = Object.entries(cats).map(([key, catInfo]) => {
    // 항목명: Report.CATEGORIES 기준 (세부진단 표와 일치)
    const subItems = catInfo.subItems || [];
    const itemCount = subItems.length;
    if (itemCount === 0) return '';

    // 참고 근거: criteria-data.js에서 unique 상위 2개 추출 (있으면)
    const cp = criteriaPages[key];
    const refSet = new Set();
    if (cp) {
      (cp.items || []).forEach(item => {
        (item.reference || '').split(/[,，、]/).forEach(r => {
          const rt = r.trim();
          if (rt) refSet.add(rt);
        });
      });
    }
    const refs = Array.from(refSet).slice(0, 2);

    const pillsHTML = subItems.map(name =>
      `<span style="display:inline-block; padding:1px 6px; margin:1px 1px 1px 0; background:#ffffff; border:1px solid #d8e2ec; border-radius:9999px; font-size:7.5px; color:#0a1628; font-weight:500">${escapeHTML(name)}</span>`
    ).join('');

    return `
      <div style="padding:8px 10px 7px; background:#f4f7fb; border-radius:6px; border-left:3px solid #4a90d9; page-break-inside:avoid">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; padding-bottom:3px; border-bottom:1px solid #d8e2ec">
          <div style="font-size:9.5px; font-weight:700; color:#1a3669">${escapeHTML(catInfo.label)}</div>
          <div style="font-size:7px; font-weight:500; color:#4a6a8a">${itemCount}개 항목</div>
        </div>
        <div style="margin-bottom:4px; line-height:1.8">${pillsHTML}</div>
        ${refs.length > 0 ? `
          <div style="font-size:7px; color:#7a8fa3; padding-top:3px; border-top:1px dashed #e8eef6">
            <strong style="color:#4a6a8a">근거</strong> ${refs.join(' / ')}
          </div>
        ` : ''}
      </div>
    `;
  }).filter(Boolean).join('');

  pages.push(pageWrap(pageNum, `
    ${pageHeader(report, '카테고리별 점검 항목 요약')}
    <div style="font-size:10px; color:#4a6a8a; line-height:1.65; margin-bottom:10px">
      본 진단에서 각 카테고리별로 점검한 개별 항목의 요약입니다.
      판정 등급 기준 · 점검 방법론 · 점검 한계는 본 보고서 앞부분 <strong>판정 기준 안내</strong>를 참고해주세요.
      개별 항목의 세부 측정 수치와 판정 근거는 <strong>세부진단 결과</strong> 페이지에서 각 항목과 함께 확인하실 수 있습니다.
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px">
      ${catCardsHTML}
    </div>

    <div style="margin-top:10px; padding:9px 12px; background:#fff8e1; border-radius:6px; border-left:3px solid #e67e22">
      <div style="font-size:8.5px; color:#4a6a8a; line-height:1.6">
        <strong style="color:#0a1628">※ 참고</strong> — 건축 시기·제조사별 자재 편차·주거 환경에 따라 동일 항목도 실제 판정이 달라질 수 있으며, 최종 판정은 현장 상황을 고려한 진단자의 종합 의견을 따릅니다.
      </div>
    </div>
    ${pageFooter(report, pageNum)}
  `));

  // ── 면책조항 / 서명 ──
  pageNum++;
  pages.push(pageWrap(pageNum, `
    ${pageHeader(report, '점검 고지 및 참고사항')}
    <div style="font-size:9.5px; color:#4a6a8a; line-height:1.8; margin-bottom:20px">
      <p>본 보고서는 육안 점검 및 간이 측정 기기를 활용한 현장 진단 결과를 바탕으로 작성되었습니다. 은폐된 부위, 가구 또는 마감재에 의해 가려진 부분 등 점검이 불가능한 부위에 대해서는 조사 범위에서 제외되었으며, 이에 대한 책임을 지지 않습니다.</p>
      <br>
      <p>본 보고서는 의뢰인에게 주택의 현재 상태에 관한 정보를 제공하기 위한 참고 자료로, 법적 효력을 갖는 공식 문서가 아닙니다. 중요한 결정 전에는 반드시 관련 전문가의 추가 자문을 받으시기 바랍니다.</p>
      <br>
      <p><strong>점검범위 및 한계:</strong> 시설물을 파손하지 않고 육안 및 장비로 확인 가능한 범위 내에서만 진단합니다. 벽체 내부, 천장 상부, 바닥 하부, 매립 배관 등 보이지 않는 곳은 확인이 불가합니다. 누수나 결로 등 특정 계절/날씨에만 발현되는 증상은 점검 시점에 발견되지 않을 수 있습니다.</p>
    </div>
    <div style="display:flex; gap:40px; margin-top:40px;">
      <div style="flex:1; text-align:center">
        <div style="font-size:10px; color:#4a6a8a; margin-bottom:8px">진단자</div>
        <div style="font-size:13px; font-weight:700; color:#0a1628; margin-bottom:4px">${val(b.inspectorName)}</div>
        <div style="border-top:1px solid #d8e2ec; margin-top:36px; padding-top:4px; font-size:9px; color:#aab8c2">(서명)</div>
      </div>
      <div style="flex:1; text-align:center">
        <div style="font-size:10px; color:#4a6a8a; margin-bottom:8px">의뢰인</div>
        <div style="font-size:13px; font-weight:700; color:#0a1628; margin-bottom:4px">${val(b.clientName)}</div>
        <div style="border-top:1px solid #d8e2ec; margin-top:36px; padding-top:4px; font-size:9px; color:#aab8c2">(서명)</div>
      </div>
    </div>
    <div style="text-align:center; margin-top:32px; font-size:9px; color:#aab8c2">
      보고서 작성일: ${val(b.reportDate)} | 더보다 AI (home.theboda.io)
    </div>
    ${pageFooter(report, pageNum)}
  `));

  // ── 서비스 연계 소개 ──
  pageNum++;
  pages.push(pageWrap(pageNum, `
    ${pageHeader(report, '더보다 AI 서비스 안내')}
    <div style="text-align:center; margin:24px 0 20px">
      <img src="assets/ci-logo.png" alt="더보다 AI" style="height:40px; margin-bottom:8px">
      <div style="font-size:10px; color:#4a6a8a">AI 기반 주택 진단 전문 서비스</div>
    </div>

    <div class="rpt-section-title">제공 서비스</div>
    <table class="info-table" style="font-size:10px; margin-bottom:16px">
      <tr>
        <td class="label-cell" style="width:120px; font-weight:700">주택 진단 보고서</td>
        <td>비파괴 정밀 진단을 통한 주택 상태 종합 분석 보고서 제공</td>
      </tr>
      <tr>
        <td class="label-cell" style="font-weight:700">환경 성능 분석</td>
        <td>단열·결로·공기질·에너지 효율 등 환경 성능 분석</td>
      </tr>
      <tr>
        <td class="label-cell" style="font-weight:700">리모델링 컨설팅</td>
        <td>진단 결과 기반 맞춤형 리모델링 방향 및 비용 제안</td>
      </tr>
      <tr>
        <td class="label-cell" style="font-weight:700">시공 품질 검수</td>
        <td>리모델링·인테리어 시공 후 품질 검수 서비스</td>
      </tr>
    </table>

    <div class="rpt-section-title">문의 및 상담</div>
    <div style="display:grid; grid-template-columns:1.3fr 1fr; gap:16px; align-items:stretch">
      <table class="info-table" style="font-size:10px; margin-bottom:0">
        <tr>
          <td class="label-cell" style="width:100px">홈페이지</td>
          <td>home.theboda.io</td>
        </tr>
        <tr>
          <td class="label-cell">상담 문의</td>
          <td>홈페이지 내 상담 예약</td>
        </tr>
        <tr>
          <td class="label-cell">보고서 번호</td>
          <td>${val(b.reportNo, '-')}</td>
        </tr>
        <tr>
          <td class="label-cell">작성일</td>
          <td>${val(b.reportDate, '-')}</td>
        </tr>
      </table>
      <div style="padding:12px; background:#ffffff; border:1px solid #d8e2ec; border-radius:8px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center">
        <img src="assets/qr-consult.svg" alt="상담 예약 QR" style="width:72px; height:72px; margin-bottom:6px">
        <div style="font-size:9px; font-weight:700; color:#1a3669">홈페이지 바로가기</div>
        <div style="font-size:8px; color:#4a6a8a; margin-top:2px">카메라로 스캔</div>
      </div>
    </div>

    <div style="margin-top:24px; padding:16px; background:#f4f7fb; border-radius:8px; text-align:center">
      <div style="font-size:11px; font-weight:600; color:#1a3669; margin-bottom:6px">더보다 AI와 함께 안전하고 건강한 주거 환경을 만들어 가세요.</div>
      <div style="font-size:9px; color:#4a6a8a">본 보고서에 대한 추가 문의사항은 언제든 연락 주시기 바랍니다.</div>
    </div>
    ${pageFooter(report, pageNum)}
  `));

  // 렌더링
  viewer.innerHTML = pages.join('');

  // 이미지 비동기 로딩
  await loadAllCardImages(report);

  // 평면도 로드
  const fpBase64 = await Report.loadImage('floorplan');
  const fpContainer = document.getElementById('preview-floorplan');
  if (fpContainer) {
    if (fpBase64) {
      fpContainer.innerHTML = `<img src="${fpBase64}" alt="평면도" style="width:100%; max-height:350px; object-fit:contain; border-radius:4px">`;
    } else {
      fpContainer.innerHTML = '<span style="font-size:9px; color:#aab8c2">평면도 미등록</span>';
    }
  }

  // 이미지 로딩 완료 후 페이지 분할 (실패해도 원본은 유지)
  await new Promise(r => setTimeout(r, 200));
  try {
    splitOverflowPages(report);
  } catch (e) {
    console.error('페이지 분할 실패 (원본 유지):', e);
  }

  // 페이지 분할 이후 실제 번호로 TOC 주입
  try {
    buildAndInjectTOC();
  } catch (e) {
    console.error('TOC 생성 실패 (placeholder 유지):', e);
  }
}

// ==========================================
// 목차(TOC) 동적 생성
// splitOverflowPages가 끝난 후 실제 .report-page DOM을 스캔해서 생성
// ==========================================
function buildAndInjectTOC() {
  const viewer = document.getElementById('report-viewer');
  const tocContent = document.getElementById('toc-content');
  if (!viewer || !tocContent) return;

  const allPages = Array.from(viewer.querySelectorAll('.report-page'));
  const items = [];
  let pageNum = 0;

  // TOC 자기 자신(toc-page)은 건너뛰고 제외하여 번호 계산
  // 표지는 페이지 번호를 가지지만 TOC에는 포함하지 않음
  allPages.forEach(page => {
    const isCover = page.classList.contains('cover-page');
    const isDivider = page.classList.contains('divider-page');
    const isToc = page.id === 'toc-page';

    if (isCover) {
      // cover는 finalNum 재정렬에서 '표지'로 라벨되고 번호를 차지하지 않음 → 카운트 제외
      return;
    }

    if (isDivider) {
      // 간지는 페이지 번호를 차지하지 않음 (기존 pageFooter 관행 유지 — 간지는 footer 없음)
      // 단 섹션 헤더로는 TOC에 포함
      const num = (page.querySelector('.divider-num') || {}).textContent || '';
      const title = (page.querySelector('.divider-title') || {}).textContent || '';
      items.push({ type: 'section', num: num.trim(), title: title.trim() });
      return;
    }

    pageNum++;
    if (isToc) {
      // TOC 자체도 페이지 번호는 차지함 (2페이지) — 리스트에서만 제외
      return;
    }

    // 일반 본문 페이지: 제목 추출
    // splitOverflowPages는 분할 첫 페이지에만 .rpt-page-title을 삽입하고,
    // 연속 페이지는 제목 없이 "이전 페이지에서 계속" div만 넣음 → 제목 없는 페이지는 TOC에서 제외
    const titleEl = page.querySelector('.rpt-page-title');
    if (!titleEl) return;

    const title = titleEl.textContent.trim();
    if (!title) return;
    items.push({ type: 'page', title, page: pageNum });
  });

  // HTML 생성
  let html = `
    <div style="font-size:10px; color:#4a6a8a; line-height:1.65; margin-bottom:16px">
      본 보고서는 4개 파트(점검 개요 · 종합 지표 · 세부 진단 · 부록)로 구성되어 있습니다. 바쁜 독자는 앞 페이지의 <strong>한눈에 보는 진단 요약</strong>부터, 상세한 내용이 필요한 독자는 아래 목차를 참고해 해당 섹션으로 이동하시기 바랍니다.
    </div>
  `;

  items.forEach(it => {
    if (it.type === 'section') {
      html += `
        <div style="margin-top:14px; margin-bottom:4px; padding-bottom:4px; border-bottom:2px solid #4a90d9">
          <span style="font-size:9px; font-weight:700; color:#4a90d9; letter-spacing:0.1em">${it.num}</span>
          <span style="font-size:13px; font-weight:700; color:#1a3669; margin-left:10px">${it.title}</span>
        </div>
      `;
    } else {
      html += `
        <div style="display:flex; align-items:baseline; padding:5px 0 5px 14px; border-bottom:1px dotted #e8eef6">
          <span style="flex:1; font-size:10.5px; color:#0a1628">${it.title}</span>
          <span style="font-size:10px; color:#4a6a8a; font-weight:600; font-variant-numeric:tabular-nums; min-width:30px; text-align:right">${it.page}</span>
        </div>
      `;
    }
  });

  tocContent.innerHTML = html;
}

// ==========================================
// 페이지 자동 분할 시스템
// A4 높이를 초과하는 report-page를 자식 노드 단위로
// 분할하여 각 페이지에 머릿글/바닥글 삽입
// ==========================================
function splitOverflowPages(report) {
  const viewer = document.getElementById('report-viewer');
  // A4 콘텐츠 공간을 페이지의 min-height에서 직접 계산
  // footer는 position:absolute라 overflow 페이지에선 아래로 밀려 있음 → 런타임 offsetTop 사용 금지
  // 반드시 "A4 고정 높이 - padding"에서 계산해야 overflow 여부와 무관하게 정확
  const FOOTER_AREA_PX = 68;  // .rpt-footer의 bottom:18mm = 68px (안쪽 padding 내부)
  const FOOTER_HEIGHT_PX = 22; // footer 자체 높이
  const SAFETY_GAP = 12;       // 콘텐츠와 footer 사이 시각적 여백

  const allPages = Array.from(viewer.querySelectorAll('.report-page'));
  let globalPageNum = 1;

  for (const page of allPages) {
    // 표지, 간지는 건너뜀
    if (page.classList.contains('cover-page') || page.classList.contains('divider-page')) {
      globalPageNum++;
      continue;
    }

    // A4 고정 높이와 padding 측정 (런타임 scroll/offset 아님)
    const style = getComputedStyle(page);
    const padTop = parseFloat(style.paddingTop) || 0;
    const padBottom = parseFloat(style.paddingBottom) || 0;
    const pageMinH = parseFloat(style.minHeight) || 1122;  // A4 = 297mm × 3.78 ≈ 1122px

    // A4 콘텐츠 사용 가능 영역: padding 안쪽 + footer 영역 제외
    // (padTop부터 footerTop까지)
    const contentAreaH = pageMinH - padTop - padBottom;  // ~940px
    const footerTopInContent = contentAreaH - (FOOTER_AREA_PX - padBottom + FOOTER_HEIGHT_PX);
    // 위 계산은 복잡하므로 단순화: content 영역에서 footer와의 최소 gap만 확보
    // contentAreaH에 이미 padding이 빠져 있고, footer가 padding 내부에 absolute로 고정돼 있으므로
    // content의 최대 높이는 contentAreaH - SAFETY_GAP
    const A4_INNER_MAX = contentAreaH - SAFETY_GAP;

    // 실제 scrollHeight(flow 콘텐츠만, absolute footer 제외) 측정
    const contentHeight = page.scrollHeight;
    const innerHeight = contentHeight - padTop - padBottom;

    if (innerHeight <= A4_INNER_MAX) {
      // 분할 불필요 — 바닥글 페이지 번호만 업데이트
      const footer = page.querySelector('.rpt-footer');
      if (footer) {
        const spans = footer.querySelectorAll('span');
        if (spans.length >= 3) spans[2].textContent = globalPageNum;
      }
      globalPageNum++;
      continue;
    }

    // === 분할 필요 ===
    // 헤더와 바닥글 추출
    const header = page.querySelector('.rpt-header');
    const pageTitle = page.querySelector('.rpt-page-title');
    const footer = page.querySelector('.rpt-footer');
    const headerHTML = header ? header.outerHTML : '';
    const titleHTML = pageTitle ? pageTitle.outerHTML : '';
    const footerHTML = footer ? footer.outerHTML : '';

    // 분할 대상 자식 노드들 수집 (헤더, 제목, 바닥글, page-label 제외)
    const children = Array.from(page.children).filter(el =>
      !el.classList.contains('rpt-header') &&
      !el.classList.contains('rpt-page-title') &&
      !el.classList.contains('rpt-footer') &&
      !el.classList.contains('page-label')
    );

    // === A4 기준 body 사용 가능 공간 계산 ===
    // header + title 실제 점유 공간 = first child의 offsetTop - padTop
    // (첫 body child가 시작하는 y에서 padding-top을 뺀 값)
    // A4에서 사용 가능한 flow 공간 = A4_INNER_MAX - header 점유
    const firstBodyOffset = children.length > 0 ? children[0].offsetTop : padTop;
    const headerFlowH = Math.max(0, firstBodyOffset - padTop);
    const MAX_BODY_H = Math.max(200, A4_INNER_MAX - headerFlowH);

    // 새 페이지들을 생성
    const newPages = [];
    let currentChildren = [];
    let currentH = 0;

    function flushPage() {
      if (currentChildren.length === 0) return;
      const pg = document.createElement('div');
      pg.className = 'report-page rpt-body';
      pg.style.position = 'relative';

      // 페이지 번호 라벨
      const lbl = document.createElement('span');
      lbl.className = 'page-label no-print';
      lbl.textContent = 'Page ' + globalPageNum;
      pg.appendChild(lbl);

      // 헤더 (첫 페이지만 제목 포함, 이후는 헤더만)
      if (newPages.length === 0) {
        pg.insertAdjacentHTML('beforeend', headerHTML);
        pg.insertAdjacentHTML('beforeend', titleHTML);
      } else {
        pg.insertAdjacentHTML('beforeend', headerHTML);
        // 연속 페이지 표시
        const contLabel = document.createElement('div');
        contLabel.style.cssText = 'font-size:9px; color:#4a6a8a; margin-bottom:10px; font-style:italic';
        contLabel.textContent = '(이전 페이지에서 계속)';
        pg.appendChild(contLabel);
      }

      currentChildren.forEach(el => pg.appendChild(el));

      // 바닥글
      const fDiv = document.createElement('div');
      fDiv.className = 'rpt-footer';
      fDiv.innerHTML = `
        <span>더보다 AI - 주택 진단 보고서</span>
        <span>${val(report.basic.address, '주소 미입력')}</span>
        <span>${globalPageNum}</span>
      `;
      pg.appendChild(fDiv);

      newPages.push(pg);
      globalPageNum++;
      currentChildren = [];
      currentH = 0;
    }

    // keep-with-next: 섹션 제목이 다음 요소와 함께 붙어 있도록 peek-ahead 확보
    // 제목만 페이지 하단에 홀로 남는 orphan 방지 — 타이포그래피 원칙
    // meas-table-title: renderFixedTablePreview가 생성하는 테이블 제목 (예: "수압 측정")
    //   → 이 클래스 누락이 B 카테고리 p.21 "수압 측정" orphan의 직접 원인이었음
    const KEEP_WITH_NEXT_CLASSES = ['rpt-section-title', 'meas-table-title', 'diag-label'];

    // 각 자식의 "실제 점유 공간"을 offsetTop 차이로 사전 계산
    // offsetHeight는 margin을 포함하지 않아 부정확 → margin collapse까지 반영되는 offsetTop 사용
    const childHeights = children.map((child, i) => {
      if (i + 1 < children.length) {
        // 다음 형제의 시작점 - 현재 시작점 = 현재 요소가 flow에서 차지한 실제 공간
        return Math.max(0, children[i + 1].offsetTop - child.offsetTop);
      }
      // 마지막 요소: offsetHeight + margin-bottom
      const cs = getComputedStyle(child);
      const mb = parseFloat(cs.marginBottom) || 0;
      return (child.offsetHeight || 0) + mb;
    });

    for (let i = 0; i < children.length; i++) {
      const child = children[i];
      const childH = childHeights[i];

      // 이 자식이 keep-with-next 대상(제목)이면 다음 요소 전체 높이만큼 공간 예약
      // 다음 요소가 fresh page에도 못 들어갈 만큼 크면 keep-with-next 포기 (orphan 수용)
      const isKeepWithNext = KEEP_WITH_NEXT_CLASSES.some(cls => child.classList && child.classList.contains(cls));
      let peekH = 0;
      if (isKeepWithNext && i + 1 < children.length) {
        const nextH = childHeights[i + 1];
        if (childH + nextH <= MAX_BODY_H) {
          // 제목 + 다음 요소가 한 페이지에 같이 들어갈 수 있음 → 실제 다음 크기만큼 예약
          peekH = nextH;
        }
        // else: 아무리 해도 같이 못 들어감 → peekH=0 (제목만이라도 현재 페이지에 배치)
      }

      // body 공간 초과 체크 — currentH는 body-relative 누적
      if (currentH + childH + peekH > MAX_BODY_H && currentChildren.length > 0) {
        flushPage();
      }

      currentChildren.push(child);
      currentH += childH;
    }
    // 마지막 페이지 마감
    flushPage();

    // 원본 페이지를 새 페이지들로 교체
    for (const np of newPages) {
      page.parentNode.insertBefore(np, page);
    }
    page.remove();
  }

  // 최종 페이지 번호 재정렬 (표지/간지 포함 전체)
  let finalNum = 1;
  const finalPages = viewer.querySelectorAll('.report-page');
  finalPages.forEach(pg => {
    const lbl = pg.querySelector('.page-label');
    if (pg.classList.contains('cover-page')) {
      if (lbl) lbl.textContent = '표지';
    } else if (pg.classList.contains('divider-page')) {
      if (lbl) lbl.textContent = '간지';
    } else {
      if (lbl) lbl.textContent = 'Page ' + finalNum;
      const footer = pg.querySelector('.rpt-footer');
      if (footer) {
        const spans = footer.querySelectorAll('span');
        if (spans.length >= 3) spans[2].textContent = finalNum;
      }
      finalNum++;
    }
  });
}

async function loadAllCardImages(report) {
  const catData = report.categoryData || {};
  const CATS = Report.CATEGORIES;

  async function loadCardsImages(cards, catKey) {
    for (const card of cards) {
      const validPhotos = (card.photos || []).filter(Boolean);
      for (let pi = 0; pi < validPhotos.length; pi++) {
        const photo = validPhotos[pi];
        if (!photo || !photo.id) continue;

        const cellEl = document.getElementById(`pcell_${catKey}_${card.id}_${pi}`);
        if (!cellEl) continue;

        const base64 = await Report.loadImage(photo.id);
        const titleText = photo.captionTitle || photo.caption || '';
        const detailText = photo.captionDetail || '';
        // observation은 detailText와 중복되는 경우 생략
        const obsText = (photo.observation && photo.observation !== detailText) ? photo.observation : '';
        // 캡션을 하나로 합침 (제목: 굵게, 설명은 이어서)
        const captionParts = [titleText, detailText, obsText].filter(Boolean);
        if (base64) {
          cellEl.innerHTML = `
            <img src="${base64}" alt="${photo.name || '사진'}">
            ${captionParts.length > 0 ? `<div class="photo-cell-caption"><span style="font-weight:600;color:#0a1628">${escapeHTML(captionParts[0])}</span>${captionParts.length > 1 ? ' - ' + escapeHTML(captionParts.slice(1).join(' / ')) : ''}</div>` : ''}
          `;
        } else {
          cellEl.innerHTML = '<div style="background:#f4f7fb;padding:20px;text-align:center;font-size:9px;color:#aab8c2;border-radius:4px">사진 없음</div>';
        }
      }
    }
  }

  for (const [cat, cd] of Object.entries(catData)) {
    const catInfo = CATS[cat];
    if (catInfo && catInfo.sections) {
      for (const sec of catInfo.sections) {
        if (sec.type === 'cards') {
          const slotCards = (cd.cardSlots || {})[sec.key] || [];
          await loadCardsImages(slotCards, cat + '_' + sec.key);
        }
      }
    } else {
      await loadCardsImages(cd.cards || [], cat);
    }
  }
}
